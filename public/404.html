<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0b0d14; color: #f0f2f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; max-width: 480px; padding: 40px; }
    .code { font-size: 96px; font-weight: 800; color: #6366f1; letter-spacing: -4px; line-height: 1; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
    p { color: #b0b8c4; font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
    .btn { display: inline-block; padding: 12px 28px; background: #6366f1; color: white; text-decoration: none; border-radius: 8px; font-size: 14px; font-weight: 600; transition: background 0.15s; }
    .btn:hover { background: #4f52d9; }
    .links { margin-top: 24px; display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .links a { color: #7a8497; font-size: 13px; text-decoration: none; }
    .links a:hover { color: #f0f2f8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Check the URL or head back to the dashboard.</p>
    <a href="/" class="btn">Back to Overview</a>
    <div class="links">
      <a href="/reports.html">Reports</a>
      <a href="/cash.html">Cash</a>
      <a href="/consolidated-bs.html">Consolidated</a>
      <a href="/kanban.html">Tasks</a>
    </div>
  </div>
</body>
</html>
