<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — Finance Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0f1117; --surface: #1a1d27; --surface2: #232734; --border: #2e3344; --text: #e4e6ef; --text-dim: #8b8fa3; --accent: #6366f1; --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --yellow: #eab308; --cyan: #06b6d4; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .nav { display: flex; gap: 4px; flex: 1; justify-content: center; }
    .nav a { padding: 6px 14px; border-radius: 6px; color: var(--text-dim); text-decoration: none; font-size: 13px; }
    .nav a:hover { background: var(--surface2); color: var(--text); }
    .nav a.active { background: var(--accent); color: white; }
    .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; cursor: pointer; }
    .btn:hover { background: var(--border); }

    /* Alerts section */
    .alerts-section { padding: 12px 28px; }
    .alerts-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 900px) { .alerts-row { grid-template-columns: 1fr; } }
    .alert-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
    .alert-card h3 { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
    .alert-list { list-style: none; }
    .alert-item { padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .alert-item:last-child { border-bottom: none; }
    .alert-label { flex: 1; }
    .alert-value { font-weight: 600; font-variant-numeric: tabular-nums; min-width: 80px; text-align: right; }
    .alert-value.neg { color: var(--red); }
    .alert-value.warn { color: var(--yellow); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; }
    .badge.danger { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge.warning { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .badge.ok { background: rgba(34,197,94,0.15); color: var(--green); }

    /* Health bar */
    .health-bar-wrapper { padding: 0 28px; margin-top: 12px; }
    .health-bar-container { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; gap: 16px; }
    .health-label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
    .health-track { flex: 1; height: 10px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
    .health-fill { height: 100%; border-radius: 5px; transition: width 0.5s, background 0.3s; }
    .health-score { font-size: 14px; font-weight: 700; min-width: 50px; text-align: right; }
    .health-details { font-size: 11px; color: var(--text-dim); display: flex; gap: 14px; }

    .board-container { padding: 24px; overflow-x: auto; }
    .board { display: flex; gap: 16px; min-height: calc(100vh - 280px); }
    .column { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; min-width: 300px; flex: 1; display: flex; flex-direction: column; }
    .column-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .column-header h2 { font-size: 14px; font-weight: 600; }
    .column-count { background: var(--surface2); border-radius: 10px; padding: 2px 8px; font-size: 11px; color: var(--text-dim); }
    .column-body { flex: 1; padding: 8px; min-height: 100px; }
    .column-body.drag-over { background: rgba(99,102,241,0.08); border-radius: 0 0 10px 10px; }

    /* Filter bar */
    .filter-bar { padding: 0 28px; margin-top: 12px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .filter-group { display: flex; gap: 4px; align-items: center; }
    .filter-group .filter-label { font-size: 11px; color: var(--text-dim); margin-right: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .filter-btn { padding: 4px 12px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { background: var(--border); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    .card { background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; cursor: grab; transition: all 0.15s; }
    .card:hover { border-color: var(--accent); border-left-color: inherit; }
    .card.dragging { opacity: 0.4; }
    .card.priority-urgent { border-left-color: var(--red); }
    .card.priority-high { border-left-color: #f97316; }
    .card.priority-medium { border-left-color: var(--blue); }
    .card.priority-low { border-left-color: var(--text-dim); }
    .card-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .card-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .card-meta span { font-size: 10px; color: var(--text-dim); }
    .priority-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .priority-dot.urgent { background: var(--red); }
    .priority-dot.high { background: #f97316; }
    .priority-dot.medium { background: var(--blue); }
    .priority-dot.low { background: var(--text-dim); }
    .card-desc { font-size: 11px; color: var(--text-dim); margin-top: 6px; max-height: 40px; overflow: hidden; }
    .due-tag { padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
    .due-tag.overdue { background: rgba(239,68,68,0.15); color: var(--red); }
    .due-tag.this-week { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .card-actions { display: flex; gap: 4px; margin-top: 8px; }
    .card-actions button { background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--text-dim); font-size: 11px; padding: 2px 8px; cursor: pointer; }
    .card-actions button:hover { background: var(--border); color: var(--text); }
    .card-actions button.del:hover { color: var(--red); }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 440px; max-width: 90vw; }
    .modal-box h2 { font-size: 16px; margin-bottom: 16px; }
    .modal-box label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; margin-top: 12px; }
    .modal-box input, .modal-box select, .modal-box textarea { width: 100%; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; font-family: inherit; }
    .modal-box textarea { resize: vertical; min-height: 60px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  </style>
  <script src="/odoo-links.js"></script>
  <script src="/auth.js"></script>
</head>
<body>
  <div class="header">
    <h1>Tasks & Alerts</h1>
    <div class="nav">
      <a href="/">Overview</a>
      <a href="/reports.html">Reports</a>
      <a href="/cash.html">Cash</a>
      <a href="/consolidated-bs.html">Consolidated</a>
      <a href="/ic-detail.html">IC Detail</a>
      <a href="/reconciliation.html">Reconciliation</a>
      <a href="/kanban.html" class="active">Tasks</a>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn" onclick="loadBoard()">Refresh</button>
      <button class="btn" style="background:var(--accent);border-color:var(--accent);color:white" onclick="openModal()">+ New Task</button>
    </div>
  </div>

  <!-- Alerts Section -->
  <div class="alerts-section">
    <div class="alerts-row">
      <div class="alert-card">
        <h3>Overdrawn Accounts</h3>
        <div id="overdrawnAlerts"><ul class="alert-list"><li class="alert-item"><span class="alert-label" style="color:var(--text-dim)">Loading...</span></li></ul></div>
      </div>
      <div class="alert-card">
        <h3>IC Imbalances</h3>
        <div id="icAlerts"><ul class="alert-list"><li class="alert-item"><span class="alert-label" style="color:var(--text-dim)">Loading...</span></li></ul></div>
      </div>
      <div class="alert-card">
        <h3>Active Alerts</h3>
        <div id="dbAlerts"><ul class="alert-list"><li class="alert-item"><span class="alert-label" style="color:var(--text-dim)">Loading...</span></li></ul></div>
      </div>
    </div>
  </div>

  <div class="health-bar-wrapper">
    <div class="health-bar-container">
      <span class="health-label">System Health</span>
      <div class="health-track"><div class="health-fill" id="healthFill" style="width:0%"></div></div>
      <span class="health-score" id="healthScore">--</span>
      <div class="health-details" id="healthDetails"></div>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <span class="filter-label">Assignee:</span>
      <button class="filter-btn active" onclick="setFilter('assignee','all')">All</button>
      <button class="filter-btn" onclick="setFilter('assignee','Ryan')">Ryan</button>
      <button class="filter-btn" onclick="setFilter('assignee','BK')">BK</button>
      <button class="filter-btn" onclick="setFilter('assignee','Apple')">Apple</button>
      <button class="filter-btn" onclick="setFilter('assignee','Mario')">Mario</button>
    </div>
    <div class="filter-group">
      <span class="filter-label">Priority:</span>
      <button class="filter-btn active" onclick="setFilter('priority','all')">All</button>
      <button class="filter-btn" onclick="setFilter('priority','urgent')">Urgent</button>
      <button class="filter-btn" onclick="setFilter('priority','high')">High</button>
    </div>
    <div class="filter-group">
      <button class="filter-btn" id="btnThisWeek" onclick="toggleThisWeek()">本周任务</button>
    </div>
  </div>

  <div class="board-container">
    <div class="board">
      <div class="column" data-status="todo">
        <div class="column-header"><h2 style="color:var(--yellow)">To Do</h2><span class="column-count" id="countTodo">0</span></div>
        <div class="column-body" id="colTodo"></div>
      </div>
      <div class="column" data-status="in_progress">
        <div class="column-header"><h2 style="color:var(--blue)">In Progress</h2><span class="column-count" id="countInProgress">0</span></div>
        <div class="column-body" id="colInProgress"></div>
      </div>
      <div class="column" data-status="done">
        <div class="column-header"><h2 style="color:var(--green)">Done</h2><span class="column-count" id="countDone">0</span></div>
        <div class="column-body" id="colDone"></div>
      </div>
      <div class="column" data-status="cancelled">
        <div class="column-header"><h2 style="color:var(--text-dim)">Cancelled</h2><span class="column-count" id="countCancelled">0</span></div>
        <div class="column-body" id="colCancelled"></div>
      </div>
    </div>
  </div>

  <!-- Task Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <h2 id="modalTitle">New Task</h2>
      <input type="hidden" id="fTaskId">
      <label>Title *</label>
      <input type="text" id="fTitle" placeholder="Task title">
      <label>Description</label>
      <textarea id="fDesc" placeholder="Details..."></textarea>
      <label>Assignee</label>
      <select id="fAssignee"><option value="">Unassigned</option></select>
      <label>Priority</label>
      <select id="fPriority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
        <option value="urgent">Urgent</option>
      </select>
      <label>Category</label>
      <input type="text" id="fCategory" placeholder="general" value="general">
      <label>Due Date</label>
      <input type="date" id="fDue">
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn" style="background:var(--accent);border-color:var(--accent);color:white" onclick="saveTask()">Save</button>
      </div>
    </div>
  </div>

  <script>
    var allTasks = [];
    var allUsers = [];
    var filters = { assignee: 'all', priority: 'all', thisWeek: false };
    var PRIORITY_ORDER = { urgent: 0, high: 1, medium: 2, low: 3 };

    function today() { return new Date().toISOString().slice(0,10); }

    function endOfWeek() {
      var d = new Date();
      d.setDate(d.getDate() + (7 - d.getDay()));
      return d.toISOString().slice(0,10);
    }

    function daysFromNow(dateStr) {
      var now = new Date(); now.setHours(0,0,0,0);
      var d = new Date(dateStr + 'T00:00:00');
      return Math.round((d - now) / 86400000);
    }

    function fmt(n) {
      if (n == null || isNaN(n)) return '--';
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n);
    }

    function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // Filters
    function setFilter(type, value) {
      filters[type] = value;
      // Update button active states
      var group = type === 'assignee' ? 0 : 1;
      var groups = document.querySelectorAll('.filter-group');
      groups[group].querySelectorAll('.filter-btn').forEach(function(btn) {
        btn.classList.remove('active');
        var btnVal = btn.textContent.trim();
        if (type === 'assignee' && ((value === 'all' && btnVal === 'All') || btnVal === value)) btn.classList.add('active');
        if (type === 'priority' && ((value === 'all' && btnVal === 'All') || btnVal.toLowerCase() === value)) btn.classList.add('active');
      });
      renderBoard();
    }

    function toggleThisWeek() {
      filters.thisWeek = !filters.thisWeek;
      document.getElementById('btnThisWeek').classList.toggle('active', filters.thisWeek);
      renderBoard();
    }

    function filterTasks(tasks) {
      return tasks.filter(function(t) {
        if (filters.assignee !== 'all') {
          var name = (t.assigned_name || '').split(' ')[0];
          if (name !== filters.assignee) return false;
        }
        if (filters.priority !== 'all' && t.priority !== filters.priority) return false;
        if (filters.thisWeek) {
          if (!t.due_date) return false;
          var days = daysFromNow(t.due_date);
          if (days > 7) return false;
        }
        return true;
      });
    }

    function sortTasks(tasks) {
      return tasks.slice().sort(function(a, b) {
        var pa = PRIORITY_ORDER[a.priority] !== undefined ? PRIORITY_ORDER[a.priority] : 9;
        var pb = PRIORITY_ORDER[b.priority] !== undefined ? PRIORITY_ORDER[b.priority] : 9;
        if (pa !== pb) return pa - pb;
        if (a.due_date && b.due_date) return a.due_date < b.due_date ? -1 : a.due_date > b.due_date ? 1 : 0;
        if (a.due_date) return -1;
        if (b.due_date) return 1;
        return 0;
      });
    }

    function dueDateTag(t) {
      if (!t.due_date || t.status === 'done' || t.status === 'cancelled') return '';
      var days = daysFromNow(t.due_date);
      if (days < 0) return '<span class="due-tag overdue">逾期</span>';
      if (days <= 7) return '<span class="due-tag this-week">本周</span>';
      return '';
    }

    function makeCard(t) {
      var el = document.createElement('div');
      el.className = 'card priority-' + t.priority;
      el.draggable = true;
      el.dataset.id = t.id;
      el.innerHTML =
        '<div class="card-title">' + esc(t.title) + '</div>' +
        (t.description ? '<div class="card-desc">' + esc(t.description) + '</div>' : '') +
        '<div class="card-meta">' +
          '<span class="priority-dot ' + t.priority + '"></span>' +
          '<span>' + t.priority + '</span>' +
          (t.due_date ? '<span>' + t.due_date + '</span>' : '') +
          dueDateTag(t) +
          '<span>' + esc(t.assigned_name || 'Unassigned') + '</span>' +
        '</div>' +
        '<div class="card-actions">' +
          '<button onclick="editTask(' + t.id + ')">Edit</button>' +
          '<button class="del" onclick="deleteTask(' + t.id + ')">Delete</button>' +
        '</div>';

      el.addEventListener('dragstart', function(e) {
        el.classList.add('dragging');
        e.dataTransfer.setData('text/plain', t.id);
        e.dataTransfer.effectAllowed = 'move';
      });
      el.addEventListener('dragend', function() { el.classList.remove('dragging'); });
      return el;
    }

    function setupDropZones() {
      document.querySelectorAll('.column-body').forEach(function(col) {
        col.addEventListener('dragover', function(e) {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          col.classList.add('drag-over');
        });
        col.addEventListener('dragleave', function() { col.classList.remove('drag-over'); });
        col.addEventListener('drop', function(e) {
          e.preventDefault();
          col.classList.remove('drag-over');
          var taskId = e.dataTransfer.getData('text/plain');
          var newStatus = col.parentElement.dataset.status;
          moveTask(parseInt(taskId), newStatus);
        });
      });
    }

    async function moveTask(id, newStatus) {
      await fetch('/api/tasks/tasks/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus })
      });
      loadBoard();
    }

    async function loadUsers() {
      try {
        allUsers = await (await fetch('/api/tasks/users')).json();
        var sel = document.getElementById('fAssignee');
        sel.innerHTML = '<option value="">Unassigned</option>' +
          allUsers.map(function(u) { return '<option value="' + u.id + '">' + esc(u.display_name) + '</option>'; }).join('');
      } catch (e) { console.error(e); }
    }

    function openModal(task) {
      document.getElementById('modalTitle').textContent = task ? 'Edit Task' : 'New Task';
      document.getElementById('fTaskId').value = task ? task.id : '';
      document.getElementById('fTitle').value = task ? task.title : '';
      document.getElementById('fDesc').value = task ? task.description : '';
      document.getElementById('fAssignee').value = task ? (task.assigned_to || '') : '';
      document.getElementById('fPriority').value = task ? task.priority : 'medium';
      document.getElementById('fCategory').value = task ? (task.category || 'general') : 'general';
      document.getElementById('fDue').value = task ? (task.due_date || '') : '';
      document.getElementById('modalOverlay').classList.add('active');
      document.getElementById('fTitle').focus();
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    async function saveTask() {
      var id = document.getElementById('fTaskId').value;
      var assignee = document.getElementById('fAssignee').value;
      var body = {
        title: document.getElementById('fTitle').value,
        description: document.getElementById('fDesc').value,
        assigned_to: assignee ? parseInt(assignee) : null,
        priority: document.getElementById('fPriority').value,
        category: document.getElementById('fCategory').value,
        due_date: document.getElementById('fDue').value || null,
      };
      if (!body.title) return alert('Title is required');
      if (id) {
        await fetch('/api/tasks/tasks/' + id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
      } else {
        await fetch('/api/tasks/tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
      }
      closeModal();
      loadBoard();
    }

    function editTask(id) {
      var task = allTasks.find(function(t) { return t.id === id; });
      if (task) openModal(task);
    }

    async function deleteTask(id) {
      if (!confirm('Delete this task?')) return;
      await fetch('/api/tasks/tasks/' + id, { method: 'DELETE' });
      loadBoard();
    }

    function renderBoard() {
      var filtered = filterTasks(allTasks);
      var groups = { todo: [], in_progress: [], done: [], cancelled: [] };
      filtered.forEach(function(t) {
        if (groups[t.status]) groups[t.status].push(t);
      });

      ['todo', 'in_progress', 'done', 'cancelled'].forEach(function(status) {
        var colId = 'col' + status.split('_').map(function(w) { return w[0].toUpperCase() + w.slice(1); }).join('');
        var countId = 'count' + status.split('_').map(function(w) { return w[0].toUpperCase() + w.slice(1); }).join('');
        var col = document.getElementById(colId);
        col.innerHTML = '';
        var sorted = sortTasks(groups[status]);
        document.getElementById(countId).textContent = sorted.length;
        sorted.forEach(function(t) { col.appendChild(makeCard(t)); });
      });
    }

    async function loadBoard() {
      allTasks = await (await fetch('/api/tasks/tasks')).json();
      renderBoard();
      loadHealth();
      loadAlerts();
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
      if (e.key === 'n' || e.key === 'N') {
        var tag = document.activeElement.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        openModal();
      }
    });

    async function loadHealth() {
      try {
        var data = await (await fetch('/api/alerts-tasks/health-status')).json();
        var fill = document.getElementById('healthFill');
        var score = document.getElementById('healthScore');
        var details = document.getElementById('healthDetails');

        fill.style.width = data.score + '%';
        fill.style.background = data.score >= 80 ? 'var(--green)' : data.score >= 50 ? 'var(--yellow)' : 'var(--red)';
        score.textContent = data.score + '%';
        score.style.color = data.score >= 80 ? 'var(--green)' : data.score >= 50 ? 'var(--yellow)' : 'var(--red)';

        details.innerHTML =
          '<span>Tasks: ' + data.tasks.done + '/' + data.tasks.total + ' done</span>' +
          (data.tasks.overdue > 0 ? '<span style="color:var(--red)">' + data.tasks.overdue + ' overdue</span>' : '') +
          (data.alerts.critical > 0 ? '<span style="color:var(--red)">' + data.alerts.critical + ' critical</span>' : '') +
          (data.alerts.open > 0 ? '<span>' + data.alerts.open + ' open alerts</span>' : '');
      } catch (e) { console.error(e); }
    }

    async function loadAlerts() {
      try {
        // Executive summary alerts
        var data = await (await fetch('/api/dashboard/executive-summary')).json();

        var odEl = document.getElementById('overdrawnAlerts');
        var overdrawn = data.alerts?.overdrawn || [];
        if (overdrawn.length === 0) {
          odEl.innerHTML = '<ul class="alert-list"><li class="alert-item"><span class="alert-label"><span class="badge ok">All Clear</span> No overdrawn accounts</span></li></ul>';
        } else {
          odEl.innerHTML = '<ul class="alert-list">' + overdrawn.map(function(a) {
            return '<li class="alert-item"><span class="alert-label"><span class="badge danger">Overdrawn</span> ' + a.company_name + ' — ' + a.account_code + '</span><span class="alert-value neg">' + fmt(a.balance) + '</span></li>';
          }).join('') + '</ul>';
        }

        var icEl = document.getElementById('icAlerts');
        var icImb = data.alerts?.ic_imbalances || [];
        if (icImb.length === 0) {
          icEl.innerHTML = '<ul class="alert-list"><li class="alert-item"><span class="alert-label"><span class="badge ok">Balanced</span> All IC reconciled</span></li></ul>';
        } else {
          icEl.innerHTML = '<ul class="alert-list">' + icImb.map(function(a) {
            return '<li class="alert-item"><span class="alert-label"><span class="badge warning">Imbalance</span> ' + a.account_code + '</span><span class="alert-value warn">' + fmt(a.net) + '</span></li>';
          }).join('') + '</ul>';
        }

        // DB alerts
        var alerts = await (await fetch('/api/alerts-tasks/alerts?resolved=false')).json();
        var dbEl = document.getElementById('dbAlerts');
        if (!alerts.length) {
          dbEl.innerHTML = '<ul class="alert-list"><li class="alert-item"><span class="alert-label"><span class="badge ok">All Clear</span> No active alerts</span></li></ul>';
        } else {
          dbEl.innerHTML = '<ul class="alert-list">' + alerts.map(function(a) {
            var cls = a.severity === 'critical' ? 'danger' : a.severity === 'warning' ? 'warning' : 'ok';
            return '<li class="alert-item"><span class="alert-label"><span class="badge ' + cls + '">' + a.severity.toUpperCase() + '</span> ' + a.title + '</span></li>';
          }).join('') + '</ul>';
        }
      } catch (e) { console.error(e); }
    }

    setupDropZones();
    loadUsers();
    loadBoard();
  </script>
<script src="/chat-widget.js"></script>
</body>
</html>
