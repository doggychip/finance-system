<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Finance Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0f1117; --surface: #1a1d27; --surface2: #232734; --border: #2e3344; --text: #e4e6ef; --text-dim: #8b8fa3; --accent: #6366f1; --green: #22c55e; --red: #ef4444; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 400px; text-align: center; }
    .login-box h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .login-box p { font-size: 13px; color: var(--text-dim); margin-bottom: 28px; }
    .login-box label { display: block; text-align: left; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; margin-top: 14px; }
    .login-box select, .login-box input { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 14px; }
    .login-box select:focus, .login-box input:focus { outline: none; border-color: var(--accent); }
    .login-box button { width: 100%; padding: 14px; border-radius: 8px; border: none; background: var(--accent); color: white; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 24px; }
    .login-box button:hover { opacity: 0.9; }
    .error { color: var(--red); font-size: 12px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Finance Dashboard</h1>
    <p>Sign in to continue</p>
    <label>User</label>
    <select id="loginUser"></select>
    <label>Password</label>
    <input type="password" id="loginPass" placeholder="Enter password">
    <button onclick="login()">Sign In</button>
    <div class="error" id="loginError"></div>
    <div style="margin-top:16px">
      <a href="#" onclick="showReset()" style="color:var(--accent);font-size:13px;text-decoration:none">修改密码</a>
    </div>

    <!-- Reset password form (hidden by default) -->
    <div id="resetForm" style="display:none;margin-top:20px;text-align:left;border-top:1px solid var(--border);padding-top:16px">
      <label>选择用户</label>
      <select id="resetUser" style="width:100%;padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;margin-bottom:12px"></select>
      <label>当前密码</label>
      <input type="password" id="resetCurrentPass" placeholder="输入当前密码" style="width:100%;padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;margin-bottom:12px">
      <label>新密码</label>
      <input type="password" id="resetNewPass" placeholder="输入新密码" style="width:100%;padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;margin-bottom:12px">
      <label>确认新密码</label>
      <input type="password" id="resetConfirmPass" placeholder="再次输入新密码" style="width:100%;padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;margin-bottom:12px">
      <button onclick="resetPassword()" style="width:100%;padding:14px;border-radius:8px;border:none;background:var(--accent);color:white;font-size:15px;font-weight:600;cursor:pointer;">修改密码</button>
      <div class="error" id="resetError" style="margin-top:8px"></div>
      <div id="resetSuccess" style="color:var(--green);font-size:12px;margin-top:8px;display:none"></div>
      <div style="margin-top:12px;text-align:center">
        <a href="#" onclick="hideReset()" style="color:var(--text-dim);font-size:13px;text-decoration:none">返回登录</a>
      </div>
    </div>
  </div>

  <script>
    // If already logged in, redirect
    try {
      var u = JSON.parse(localStorage.getItem('finance_user'));
      if (u && u.id) window.location.href = '/';
    } catch(e) {}

    async function loadUsers() {
      var users = await (await fetch('/api/tasks/users')).json();
      var sel = document.getElementById('loginUser');
      sel.innerHTML = users.map(function(u) {
        return '<option value="' + u.username + '">' + u.display_name + ' (' + u.username + ')</option>';
      }).join('');
    }

    async function login() {
      var username = document.getElementById('loginUser').value;
      var password = document.getElementById('loginPass').value;
      if (!password) { document.getElementById('loginError').textContent = 'Enter password'; return; }

      var res = await fetch('/api/tasks/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      });

      if (!res.ok) {
        document.getElementById('loginError').textContent = 'Invalid credentials';
        return;
      }

      var user = await res.json();
      localStorage.setItem('finance_user', JSON.stringify(user));
      window.location.href = '/';
    }

    document.getElementById('loginPass').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') login();
    });

    function showReset() {
      document.getElementById('resetForm').style.display = 'block';
      // Copy users to reset dropdown
      var users = document.getElementById('loginUser');
      var resetSel = document.getElementById('resetUser');
      resetSel.innerHTML = users.innerHTML;
    }
    function hideReset() {
      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('resetError').textContent = '';
      document.getElementById('resetSuccess').style.display = 'none';
    }

    async function resetPassword() {
      var username = document.getElementById('resetUser').value;
      var currentPass = document.getElementById('resetCurrentPass').value;
      var newPass = document.getElementById('resetNewPass').value;
      var confirmPass = document.getElementById('resetConfirmPass').value;
      var errEl = document.getElementById('resetError');
      var sucEl = document.getElementById('resetSuccess');
      errEl.textContent = '';
      sucEl.style.display = 'none';

      if (!currentPass) { errEl.textContent = '请输入当前密码'; return; }
      if (!newPass || newPass.length < 4) { errEl.textContent = '新密码至少4个字符'; return; }
      if (newPass !== confirmPass) { errEl.textContent = '两次密码不一致'; return; }

      // First login to get user ID
      var loginRes = await fetch('/api/tasks/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: currentPass })
      });
      if (!loginRes.ok) { errEl.textContent = '当前密码错误'; return; }
      var user = await loginRes.json();

      // Change password
      var res = await fetch('/api/tasks/users/' + user.id + '/password', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ current_password: currentPass, new_password: newPass })
      });
      if (!res.ok) {
        var data = await res.json();
        errEl.textContent = data.error || '修改失败';
        return;
      }
      sucEl.textContent = '密码修改成功！';
      sucEl.style.display = 'block';
      document.getElementById('resetCurrentPass').value = '';
      document.getElementById('resetNewPass').value = '';
      document.getElementById('resetConfirmPass').value = '';
      setTimeout(hideReset, 2000);
    }

    loadUsers();
  </script>
</body>
</html>
