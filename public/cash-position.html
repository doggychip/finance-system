<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cash Position — Finance Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0f1117; --surface: #1a1d27; --surface2: #232734; --border: #2e3344; --text: #e4e6ef; --text-dim: #8b8fa3; --accent: #6366f1; --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --yellow: #eab308; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.4; font-size: 12px; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .nav { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; justify-content: center; }
    .nav a { padding: 5px 12px; border-radius: 5px; color: var(--text-dim); text-decoration: none; font-size: 12px; }
    .nav a:hover { background: var(--surface2); color: var(--text); }
    .nav a.active { background: var(--accent); color: white; }
    .btn { padding: 6px 14px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; cursor: pointer; }
    .btn:hover { background: var(--border); }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 6px 12px; font-size: 10px; color: var(--text-dim); text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 5px 12px; font-size: 12px; border-bottom: 1px solid var(--border); }
    tr:hover td { background: var(--surface2); }
    .val { text-align: right; font-variant-numeric: tabular-nums; }
    .pos { color: var(--text); } .neg { color: var(--red); } .zero { color: var(--text-dim); }
    .change-pos { color: var(--green); } .change-neg { color: var(--red); }
    .parent-row td { background: #1a365d; color: white; font-weight: 700; font-size: 13px; padding: 10px 12px; }
    .company-row td { padding-left: 24px; }
    .subtotal-row td { font-weight: 700; background: rgba(99,102,241,0.08); border-top: 2px solid var(--border); padding-left: 12px; }
    .grand-row td { font-weight: 800; font-size: 13px; background: rgba(234,179,8,0.08); border-top: 3px solid var(--yellow); }
    .date-label { font-size: 11px; color: var(--text-dim); padding: 8px 0; }
    .controls { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    .controls label { font-size: 12px; color: var(--text-dim); }
    .controls select, .controls input { padding: 5px 8px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; }
    .btn-apply { padding: 6px 14px; border-radius: 5px; border: none; background: var(--accent); color: white; font-size: 12px; cursor: pointer; }
    .btn-apply:hover { opacity: 0.9; }
    .loading { display: flex; align-items: center; justify-content: center; min-height: 300px; color: var(--text-dim); font-size: 14px; }
  </style>
  <script src="/auth.js"></script>
</head>
<body>
  <div class="header">
    <h1>Cash Position</h1>
    <div class="nav">
      <a href="/">Overview</a>
      <a href="/cash.html">Cash</a>
      <a href="/balance-sheet.html">Balance Sheet</a>
      <a href="/cash-flow.html">Cash Flow</a>
      <a href="/consolidated-bs.html">Consolidated</a>
      <a href="/reports.html">Reports</a>
      <a href="/cash-position.html" class="active">Cash Position</a>
      <a href="/tasks.html">Tasks</a>
    </div>
  </div>
  <div class="controls">
    <label>As of:</label>
    <select id="asOfDate"></select>
    <label>Prior:</label>
    <select id="priorDate"></select>
    <button class="btn-apply" onclick="loadAll()">Apply</button>
  </div>
  <script src="/odoo-links.js"></script>
  <div class="container">
    <div id="content"><div class="loading">Loading...</div></div>
  </div>
  <script>
    // Entity group layout - Foundation cash fetched from API
    var FOUNDATION_CASH = 5942149; // fallback
    function buildLayout(fc) {
      return [
        { type: 'parent', name: 'Libeccio Wholly Owned (Xterio)' },
        { type: 'entity', key: 'LTECH, LTECH W3', label: 'Libecciotech', companies: ['LTECH', 'LTECH W3'] },
        { type: 'entity', key: 'XLABS, XLAB W3', label: 'Xterio Labs', companies: ['XLABS', 'XLABS W3'] },
        { type: 'entity', key: 'PRIVILEGE HK', label: 'Privilege HK', companies: ['PRIVILEGE HK'] },
        { type: 'manual', label: 'Xterio Foundation', value: fc },
        { type: 'subtotal', label: 'Xterio Total', keys: ['LTECH, LTECH W3', 'XLABS, XLAB W3', 'PRIVILEGE HK'], manualAdd: fc },
        { type: 'parent', name: 'Gamephilos' },
        { type: 'entity', key: 'AOD', label: 'AOD', companies: ['GAMEPHILOS', 'GAMEPHILOS W3', 'MAOFAN', 'DIFANHA'] },
        { type: 'parent', name: 'CS' },
        { type: 'entity', key: 'CS', label: 'CS', companies: ['SHADOWCAY', 'SHADOWCAY W3', 'CHAOYING', 'DIREWOLF', 'COS GAMES', 'COS GAMES W3'] },
        { type: 'parent', name: 'Palios' },
        { type: 'entity', key: 'Palios', label: 'Palios', companies: ['PALIO W3', 'BJ TUDONG'] },
        { type: 'entity', key: 'QUANTUMMIND', label: 'Quantummind', companies: ['QUANTUMMIND SOLUTIONS HK'] },
        { type: 'parent', name: 'Holdings' },
        { type: 'entity', key: 'LHOLDINGS', label: 'Holdings', companies: ['LHOLDINGS', 'LHOLDINGS W3'] },
        { type: 'parent', name: 'Overworld Inc' },
        { type: 'entity', key: 'OW', label: 'Overworld', companies: ['OVERWORLD', 'OVERWORLD W3'] },
        { type: 'entity', key: 'Reach', label: 'Reach Labs', companies: ['REACH LABS'] },
        { type: 'entity', key: 'Rough house', label: 'Rough House', companies: ['ROUGH HOUSE'] },
        { type: 'subtotal', label: 'OW & Reach Total', keys: ['OW', 'Reach', 'Rough house'] },
      ];
    }
    var LAYOUT = buildLayout(FOUNDATION_CASH);
    fetch('/api/dashboard/entity-groups').then(function(r) { return r.json(); }).then(function(data) {
      if (data.foundation_cash) { FOUNDATION_CASH = data.foundation_cash; LAYOUT = buildLayout(FOUNDATION_CASH); }
    }).catch(function() {});

    function fmt(n) {
      if (n == null || isNaN(n)) return '-';
      if (Math.abs(n) < 0.5) return '-';
      var s = Math.abs(Math.round(n)).toLocaleString('en-US');
      return n < 0 ? '(' + s + ')' : s;
    }
    function fmtPct(n) { return (n == null || isNaN(n) || !isFinite(n)) ? '-' : n.toFixed(1) + '%'; }
    function valCls(n) { return Math.abs(n) < 0.5 ? 'val zero' : n < 0 ? 'val neg' : 'val pos'; }
    function chgCls(n) { return n >= 0.5 ? 'val change-pos' : n <= -0.5 ? 'val change-neg' : 'val zero'; }

    function row(label, cur, prior, cls) {
      var chg = cur - prior;
      var pct = prior !== 0 ? (chg / Math.abs(prior) * 100) : 0;
      var labelHtml = '<td>' + label + '</td>';
      // Make company rows clickable to Odoo bank accounts
      if (cls === 'company-row') {
        labelHtml = '<td style="cursor:pointer;text-decoration:underline dotted" onclick="window.open(odooUrl(\'bank-accounts\'),\'_blank\')">' + label + '</td>';
      }
      return '<tr class="' + (cls || '') + '">' + labelHtml +
        '<td class="' + valCls(cur) + '" style="cursor:pointer" onclick="window.open(odooUrl(\'bank-accounts\'),\'_blank\')">' + fmt(cur) + '</td>' +
        '<td class="' + valCls(prior) + '">' + fmt(prior) + '</td>' +
        '<td class="' + chgCls(chg) + '">' + fmt(chg) + '</td>' +
        '<td class="' + chgCls(chg) + '">' + fmtPct(pct) + '</td></tr>';
    }

    // Load available snapshots into dropdowns
    async function loadSnapshots() {
      var snaps = await (await fetch('/api/dashboard/snapshots')).json();
      var asOfSel = document.getElementById('asOfDate');
      var priorSel = document.getElementById('priorDate');
      asOfSel.innerHTML = '';
      priorSel.innerHTML = '';
      snaps.forEach(function(s, i) {
        var opt1 = document.createElement('option');
        opt1.value = s.snapshot_date;
        opt1.textContent = s.snapshot_date + ' (' + s.account_count + ' accounts)';
        asOfSel.appendChild(opt1);
        var opt2 = document.createElement('option');
        opt2.value = s.snapshot_date;
        opt2.textContent = s.snapshot_date + ' (' + s.account_count + ' accounts)';
        priorSel.appendChild(opt2);
      });
      // Default: as_of = first (latest), prior = second
      if (snaps.length >= 2) {
        asOfSel.value = snaps[0].snapshot_date;
        priorSel.value = snaps[1].snapshot_date;
      }
    }
    loadSnapshots();

    async function loadAll() {
      var el = document.getElementById('content');
      var asOf = document.getElementById('asOfDate').value;
      var prior = document.getElementById('priorDate').value;
      if (!asOf || !prior) { el.innerHTML = '<div class="loading">Select dates first</div>'; return; }
      try {
        var data = await (await fetch('/api/dashboard/bank-accounts?as_of_date=' + asOf + '&prior_date=' + prior)).json();
        if (!data.groups || !data.groups.length) { el.innerHTML = '<div class="loading">No data.</div>'; return; }

        // Build lookup: company_name -> { total_current, total_prior }
        var byCompany = {};
        var byEntity = {};
        data.groups.forEach(function(g) {
          byEntity[g.name] = g;
          g.accounts.forEach(function(a) {
            if (!byCompany[a.company_name]) byCompany[a.company_name] = { current: 0, prior: 0 };
            byCompany[a.company_name].current += a.current_balance;
            byCompany[a.company_name].prior += a.prior_balance;
          });
        });

        var html = '<div class="date-label">Cash Position as at <strong>' + data.snapshot_date + '</strong> | Prior: ' + data.prior_date + '</div>';
        html += '<table><thead><tr><th>Entity / Company</th><th class="val">Balance (USD)</th><th class="val">Prior Week</th><th class="val">Change</th><th class="val">%</th></tr></thead><tbody>';

        var grandCur = 0, grandPrior = 0;

        LAYOUT.forEach(function(item) {
          if (item.type === 'parent') {
            html += '<tr class="parent-row"><td colspan="5">' + item.name + '</td></tr>';

          } else if (item.type === 'entity') {
            // Entity total row
            var g = byEntity[item.key];
            var eCur = g ? g.total_current : 0;
            var ePrior = g ? g.total_prior : 0;
            html += row(item.label, eCur, ePrior, 'subtotal-row');
            grandCur += eCur;
            grandPrior += ePrior;

            // Individual company rows
            if (item.companies) {
              item.companies.forEach(function(cName) {
                var c = byCompany[cName];
                if (c && Math.abs(c.current) > 0.5) {
                  html += row(cName, c.current, c.prior, 'company-row');
                }
              });
            }

          } else if (item.type === 'manual') {
            html += row(item.label, item.value, item.value, 'company-row');
            grandCur += item.value;
            grandPrior += item.value;

          } else if (item.type === 'subtotal') {
            var cur = item.manualAdd || 0;
            var prior = item.manualAdd || 0;
            (item.keys || []).forEach(function(k) {
              var g = byEntity[k];
              if (g) { cur += g.total_current; prior += g.total_prior; }
            });
            html += row(item.label, cur, prior, 'subtotal-row');
          }
        });

        html += row('Grand Total', grandCur, grandPrior, 'grand-row');
        html += '</tbody></table>';
        el.innerHTML = html;
      } catch (err) {
        el.innerHTML = '<div class="loading">Error: ' + err.message + '</div>';
      }
    }
    loadAll();
  </script>
<script src="/chat-widget.js"></script>
</body>
</html>
