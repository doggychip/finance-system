<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cash Position — Finance Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0f1117; --surface: #1a1d27; --surface2: #232734; --border: #2e3344; --text: #e4e6ef; --text-dim: #8b8fa3; --accent: #6366f1; --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --yellow: #eab308; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.4; font-size: 12px; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .nav { display: flex; gap: 4px; flex-wrap: wrap; }
    .nav a { padding: 5px 12px; border-radius: 5px; color: var(--text-dim); text-decoration: none; font-size: 12px; }
    .nav a:hover { background: var(--surface2); color: var(--text); }
    .nav a.active { background: var(--accent); color: white; }
    .btn { padding: 6px 14px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; cursor: pointer; }
    .btn:hover { background: var(--border); }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 8px 12px; font-size: 11px; color: var(--text-dim); text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 8px 12px; font-size: 13px; border-bottom: 1px solid var(--border); }
    tr:hover td { background: var(--surface2); }
    .val { text-align: right; font-variant-numeric: tabular-nums; }
    .pos { color: var(--text); }
    .neg { color: var(--red); }
    .zero { color: var(--text-dim); }
    .change-pos { color: var(--green); }
    .change-neg { color: var(--red); }

    .parent-row td { background: #1a365d; color: white; font-weight: 700; font-size: 13px; padding: 10px 12px; }
    .subtotal-row td { font-weight: 700; background: rgba(99,102,241,0.08); border-top: 2px solid var(--border); }
    .grand-row td { font-weight: 800; font-size: 14px; background: rgba(234,179,8,0.08); border-top: 3px solid var(--yellow); }
    .entity-row td { padding-left: 24px; }

    .info-bar { padding: 8px 12px; color: var(--text-dim); font-size: 11px; margin-top: 12px; }
    .loading { display: flex; align-items: center; justify-content: center; min-height: 300px; color: var(--text-dim); font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Cash Position</h1>
    <div class="nav">
      <a href="/">Overview</a>
      <a href="/cash.html">Cash</a>
      <a href="/balance-sheet.html">Balance Sheet</a>
      <a href="/consolidated-bs.html">Consolidated</a>
      <a href="/reports.html">Reports</a>
      <a href="/cash-position.html" class="active">Cash Position</a>
    </div>
    <button class="btn" onclick="loadAll()">Refresh</button>
  </div>

  <div class="container">
    <div id="content"><div class="loading">Loading...</div></div>
  </div>

  <script>
    var LAYOUT = [
      { type: 'parent', name: 'Libeccio Wholly Owned (Xterio)' },
      { type: 'entity', key: 'LTECH, LTECH W3', label: 'Libecciotech' },
      { type: 'entity', key: 'XLABS, XLAB W3', label: 'Xterio Labs' },
      { type: 'entity', key: 'PRIVILEGE HK', label: 'Privilege HK' },
      { type: 'manual', label: 'Xterio Foundation', value: 5933488 },
      { type: 'subtotal', label: 'Xterio Total', keys: ['LTECH, LTECH W3', 'XLABS, XLAB W3', 'PRIVILEGE HK'], manualAdd: 5933488 },

      { type: 'parent', name: 'AOD (Gamephilos)' },
      { type: 'entity', key: 'AOD', label: 'AOD' },

      { type: 'parent', name: 'CS (Shadowcay)' },
      { type: 'entity', key: 'CS', label: 'CS' },

      { type: 'parent', name: 'Palios' },
      { type: 'entity', key: 'Palios', label: 'Palios' },

      { type: 'parent', name: 'Holdings' },
      { type: 'entity', key: 'LHOLDINGS', label: 'LHoldings' },

      { type: 'parent', name: 'Quantummind' },
      { type: 'entity', key: 'QUANTUMMIND', label: 'Quantummind' },

      { type: 'parent', name: 'Overworld & Reach' },
      { type: 'entity', key: 'OW', label: 'Overworld' },
      { type: 'entity', key: 'Reach', label: 'Reach Labs' },
      { type: 'entity', key: 'Rough house', label: 'Rough House' },
      { type: 'entity', key: 'Keystone', label: 'Keystone' },
      { type: 'subtotal', label: 'OW & Reach Total', keys: ['OW', 'Reach', 'Rough house', 'Keystone'] },
    ];

    function fmt(n) {
      if (n == null || isNaN(n)) return '-';
      if (Math.abs(n) < 0.5) return '-';
      var s = Math.abs(Math.round(n)).toLocaleString('en-US');
      return n < 0 ? '(' + s + ')' : s;
    }
    function fmtPct(n) {
      if (n == null || isNaN(n) || !isFinite(n)) return '-';
      return n.toFixed(1) + '%';
    }
    function valCls(n) { return Math.abs(n) < 0.5 ? 'val zero' : n < 0 ? 'val neg' : 'val pos'; }
    function chgCls(n) { return n >= 0.5 ? 'val change-pos' : n <= -0.5 ? 'val change-neg' : 'val zero'; }

    function entityRow(label, cur, prior, cls) {
      var chg = cur - prior;
      var pct = prior !== 0 ? (chg / Math.abs(prior) * 100) : 0;
      return '<tr class="' + (cls || 'entity-row') + '">' +
        '<td>' + label + '</td>' +
        '<td class="' + valCls(cur) + '">' + fmt(cur) + '</td>' +
        '<td class="' + valCls(prior) + '">' + fmt(prior) + '</td>' +
        '<td class="' + chgCls(chg) + '">' + fmt(chg) + '</td>' +
        '<td class="' + chgCls(chg) + '">' + fmtPct(pct) + '</td></tr>';
    }

    async function loadAll() {
      var el = document.getElementById('content');
      try {
        var data = await (await fetch('/api/dashboard/bank-accounts?as_of_date=2026-02-28&prior_date=2026-02-04')).json();
        if (!data.groups || !data.groups.length) {
          el.innerHTML = '<div class="loading">No data. Sync balances first.</div>';
          return;
        }

        var byEntity = {};
        data.groups.forEach(function(g) { byEntity[g.name] = g; });

        var html = '<table><thead><tr><th>Entity</th><th class="val">Balance (USD)</th><th class="val">Prior Week</th><th class="val">Change</th><th class="val">%</th></tr></thead><tbody>';

        var grandTotal = 0, grandPrior = 0;

        LAYOUT.forEach(function(item) {
          if (item.type === 'parent') {
            html += '<tr class="parent-row"><td colspan="5">' + item.name + '</td></tr>';
          } else if (item.type === 'entity') {
            var g = byEntity[item.key];
            var cur = g ? g.total_current : 0;
            var prior = g ? g.total_prior : 0;
            html += entityRow(item.label, cur, prior);
            grandTotal += cur;
            grandPrior += prior;
          } else if (item.type === 'manual') {
            html += entityRow(item.label, item.value, item.value);
          } else if (item.type === 'subtotal') {
            var cur = (item.manualAdd || 0);
            var prior = (item.manualAdd || 0);
            (item.keys || []).forEach(function(k) {
              var g = byEntity[k];
              if (g) { cur += g.total_current; prior += g.total_prior; }
            });
            html += entityRow(item.label, cur, prior, 'subtotal-row');
          }
        });

        html += entityRow('Grand Total', grandTotal, grandPrior, 'grand-row');
        html += '</tbody></table>';
        html += '<div class="info-bar">Snapshot: ' + data.snapshot_date + ' | Prior: ' + data.prior_date + '</div>';

        el.innerHTML = html;
      } catch (err) {
        el.innerHTML = '<div class="loading">Error: ' + err.message + '</div>';
      }
    }

    loadAll();
  </script>
</body>
</html>
