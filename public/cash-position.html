<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cash Position — Finance Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0f1117; --surface: #1a1d27; --surface2: #232734; --border: #2e3344; --text: #e4e6ef; --text-dim: #8b8fa3; --accent: #6366f1; --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --yellow: #eab308; --cyan: #06b6d4; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.4; font-size: 12px; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .nav { display: flex; gap: 4px; flex-wrap: wrap; }
    .nav a { padding: 5px 12px; border-radius: 5px; color: var(--text-dim); text-decoration: none; font-size: 12px; }
    .nav a:hover { background: var(--surface2); color: var(--text); }
    .nav a.active { background: var(--accent); color: white; }
    .btn { padding: 6px 14px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; cursor: pointer; }
    .btn:hover { background: var(--border); }
    .scroll-wrap { overflow-x: auto; padding: 16px; }

    /* Parent group header */
    .parent-group { margin-bottom: 32px; }
    .parent-header { font-size: 16px; font-weight: 700; padding: 10px 0; border-bottom: 2px solid var(--accent); margin-bottom: 16px; color: var(--accent); }

    /* Entity group card */
    .group-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
    .group-header { padding: 10px 16px; background: var(--surface2); display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 13px; }
    .group-header .total { font-variant-numeric: tabular-nums; }

    /* Account table */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 4px 10px; font-size: 10px; color: var(--text-dim); text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 4px 10px; font-size: 11px; border-bottom: 1px solid var(--border); }
    tr:hover td { background: var(--surface2); }
    .val { text-align: right; font-variant-numeric: tabular-nums; }
    .pos { color: var(--text); }
    .neg { color: var(--red); }
    .zero { color: var(--text-dim); }
    .change-pos { color: var(--green); }
    .change-neg { color: var(--red); }
    .type-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; }
    .type-cash { background: rgba(34,197,94,0.12); color: var(--green); }
    .type-crypto { background: rgba(139,92,246,0.12); color: #8b5cf6; }

    /* Subtotal row */
    .subtotal-row td { font-weight: 700; background: rgba(99,102,241,0.06); border-top: 2px solid var(--border); }

    .loading { display: flex; align-items: center; justify-content: center; min-height: 300px; color: var(--text-dim); font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Cash Position</h1>
    <div class="nav">
      <a href="/">Overview</a>
      <a href="/cash.html">Cash</a>
      <a href="/balance-sheet.html">Balance Sheet</a>
      <a href="/consolidated-bs.html">Consolidated</a>
      <a href="/reports.html">Reports</a>
      <a href="/cash-position.html" class="active">Cash Position</a>
    </div>
    <button class="btn" onclick="loadAll()">Refresh</button>
  </div>

  <div class="scroll-wrap">
    <div id="content"><div class="loading">Loading cash positions...</div></div>
  </div>

  <script>
    // Parent groupings matching the spreadsheet
    var PARENT_GROUPS = [
      {
        name: 'Libeccio Wholly Owned (Xterio)',
        entities: ['LTECH, LTECH W3', 'XLABS, XLAB W3', 'PRIVILEGE HK', 'Xterio Foundation'],
        subtotal: 'Xterio Total'
      },
      {
        name: 'AOD (Gamephilos)',
        entities: ['AOD'],
        subtotal: null
      },
      {
        name: 'CS (Shadowcay)',
        entities: ['CS'],
        subtotal: null
      },
      {
        name: 'Palios',
        entities: ['Palios'],
        subtotal: null
      },
      {
        name: 'Holdings',
        entities: ['LHOLDINGS'],
        subtotal: null
      },
      {
        name: 'Quantummind',
        entities: ['QUANTUMMIND'],
        subtotal: null
      },
      {
        name: 'Overworld',
        entities: ['OW'],
        subtotal: null
      },
      {
        name: 'Reach Labs',
        entities: ['Reach'],
        subtotal: null
      },
      {
        name: 'Rough House',
        entities: ['Rough house'],
        subtotal: null
      },
    ];

    function fmt(n) {
      if (n == null || isNaN(n)) return '-';
      if (Math.abs(n) < 0.5) return '-';
      var s = Math.abs(Math.round(n)).toLocaleString('en-US');
      return n < 0 ? '(' + s + ')' : s;
    }
    function fmtPct(n) {
      if (n == null || isNaN(n) || !isFinite(n)) return '-';
      return n.toFixed(1) + '%';
    }
    function valCls(n) { return Math.abs(n) < 0.5 ? 'val zero' : n < 0 ? 'val neg' : 'val pos'; }

    function renderGroup(name, accounts, total, priorTotal) {
      var change = total - priorTotal;
      var changePct = priorTotal !== 0 ? (change / Math.abs(priorTotal) * 100) : 0;
      var changeCls = change >= 0 ? 'change-pos' : 'change-neg';

      var html = '<div class="group-card">';
      html += '<div class="group-header"><span>' + name + '</span>';
      html += '<span class="total">' + fmt(total) + ' <span class="' + changeCls + '" style="font-size:11px">(' + fmtPct(changePct) + ')</span></span></div>';

      html += '<table><thead><tr>';
      html += '<th>Company</th><th>Code</th><th>Account</th><th>Type</th>';
      html += '<th class="val">Balance (USD)</th><th class="val">Prior</th>';
      html += '<th class="val">Change</th><th class="val">%</th>';
      html += '</tr></thead><tbody>';

      accounts.forEach(function(a) {
        var chg = a.change;
        var chgCls = chg >= 0.5 ? 'change-pos' : chg <= -0.5 ? 'change-neg' : 'zero';
        var typeCls = a.asset_type === 'Crypto' ? 'type-crypto' : 'type-cash';
        html += '<tr>';
        html += '<td style="color:var(--text-dim)">' + a.company_name + '</td>';
        html += '<td style="color:var(--text-dim)">' + a.code + '</td>';
        html += '<td>' + a.name + '</td>';
        html += '<td><span class="type-badge ' + typeCls + '">' + a.asset_type + '</span></td>';
        html += '<td class="' + valCls(a.current_balance) + '">' + fmt(a.current_balance) + '</td>';
        html += '<td class="' + valCls(a.prior_balance) + '">' + fmt(a.prior_balance) + '</td>';
        html += '<td class="val ' + chgCls + '">' + fmt(chg) + '</td>';
        html += '<td class="val ' + chgCls + '">' + fmtPct(a.change_pct) + '</td>';
        html += '</tr>';
      });

      html += '</tbody></table></div>';
      return html;
    }

    async function loadAll() {
      var el = document.getElementById('content');
      try {
        var data = await (await fetch('/api/dashboard/bank-accounts?as_of_date=2026-02-28&prior_date=2026-02-04')).json();
        if (!data.groups || !data.groups.length) {
          el.innerHTML = '<div class="loading">No data. Sync balances first.</div>';
          return;
        }

        // Build lookup by entity name
        var byEntity = {};
        data.groups.forEach(function(g) { byEntity[g.name] = g; });

        var html = '';
        var grandTotal = 0;
        var grandPrior = 0;

        PARENT_GROUPS.forEach(function(pg) {
          html += '<div class="parent-group">';
          html += '<div class="parent-header">' + pg.name + '</div>';

          var parentTotal = 0;
          var parentPrior = 0;

          pg.entities.forEach(function(entityName) {
            var g = byEntity[entityName];
            if (!g) {
              // Manual entity (e.g., Xterio Foundation)
              html += '<div class="group-card"><div class="group-header"><span>' + entityName + '</span><span class="total" style="color:var(--text-dim)">Manual entry</span></div></div>';
              return;
            }
            html += renderGroup(entityName, g.accounts, g.total_current, g.total_prior);
            parentTotal += g.total_current;
            parentPrior += g.total_prior;
          });

          // Parent subtotal
          if (pg.entities.length > 1 || pg.subtotal) {
            var pChange = parentTotal - parentPrior;
            var pPct = parentPrior !== 0 ? (pChange / Math.abs(parentPrior) * 100) : 0;
            var pCls = pChange >= 0 ? 'change-pos' : 'change-neg';
            html += '<table><tbody><tr class="subtotal-row">';
            html += '<td colspan="4"><strong>' + (pg.subtotal || pg.name) + ' Total</strong></td>';
            html += '<td class="' + valCls(parentTotal) + '">' + fmt(parentTotal) + '</td>';
            html += '<td class="' + valCls(parentPrior) + '">' + fmt(parentPrior) + '</td>';
            html += '<td class="val ' + pCls + '">' + fmt(pChange) + '</td>';
            html += '<td class="val ' + pCls + '">' + fmtPct(pPct) + '</td>';
            html += '</tr></tbody></table>';
          }

          grandTotal += parentTotal;
          grandPrior += parentPrior;
          html += '</div>';
        });

        // Grand total
        var gChange = grandTotal - grandPrior;
        var gPct = grandPrior !== 0 ? (gChange / Math.abs(grandPrior) * 100) : 0;
        var gCls = gChange >= 0 ? 'change-pos' : 'change-neg';
        html += '<div class="parent-group"><div class="parent-header" style="border-color:var(--yellow);color:var(--yellow)">Grand Total</div>';
        html += '<table><tbody><tr class="subtotal-row" style="font-size:14px">';
        html += '<td colspan="4"><strong>All Entities</strong></td>';
        html += '<td class="' + valCls(grandTotal) + '">' + fmt(grandTotal) + '</td>';
        html += '<td class="' + valCls(grandPrior) + '">' + fmt(grandPrior) + '</td>';
        html += '<td class="val ' + gCls + '">' + fmt(gChange) + '</td>';
        html += '<td class="val ' + gCls + '">' + fmtPct(gPct) + '</td>';
        html += '</tr></tbody></table></div>';

        html += '<div style="padding:8px;color:var(--text-dim);font-size:11px">Snapshot: ' + data.snapshot_date + ' | Prior: ' + data.prior_date + '</div>';

        el.innerHTML = html;
      } catch (err) {
        el.innerHTML = '<div class="loading">Error: ' + err.message + '</div>';
      }
    }

    loadAll();
  </script>
</body>
</html>
