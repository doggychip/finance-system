<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IC Detail — Liabilities Breakdown</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0f1117; --surface: #1a1d27; --surface2: #232734; --border: #2e3344; --text: #e4e6ef; --text-dim: #8b8fa3; --accent: #6366f1; --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --yellow: #eab308; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.4; font-size: 11px; }

    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .header h1 { font-size: 17px; font-weight: 600; }
    .nav { display: flex; gap: 4px; flex: 1; justify-content: center; flex-wrap: wrap; }
    .nav a { padding: 5px 12px; border-radius: 5px; color: var(--text-dim); text-decoration: none; font-size: 12px; }
    .nav a:hover { background: var(--surface2); color: var(--text); }
    .nav a.active { background: var(--accent); color: white; }
    .controls { padding: 10px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }
    .controls label { font-size: 12px; color: var(--text-dim); }
    .controls input { padding: 5px 8px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; }
    .btn { padding: 6px 14px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; cursor: pointer; }
    .btn:hover { background: var(--border); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }

    .scroll-container { overflow-x: auto; padding: 16px; }
    table { border-collapse: collapse; width: max-content; min-width: 100%; }
    th, td { padding: 4px 10px; border: 1px solid var(--border); white-space: nowrap; font-size: 11px; }
    thead th { background: #1a365d; color: white; font-weight: 700; font-size: 10px; text-align: center; padding: 8px 10px; position: sticky; top: 0; z-index: 2; }
    thead th.subtotal-col { background: #2d4a22; }
    thead th.total-col { background: #4a1d1d; }

    .row-label { position: sticky; left: 0; background: var(--surface); z-index: 1; min-width: 360px; max-width: 360px; font-weight: 500; font-size: 11px; }
    .val { text-align: right; font-variant-numeric: tabular-nums; }
    .val.positive { color: var(--text); }
    .val.negative { color: var(--red); }
    .val.zero { color: var(--text-dim); }
    .subtotal-val { background: rgba(34,197,94,0.04); }
    .total-val { background: rgba(239,68,68,0.04); }

    .section-row td, .section-row .row-label { background: #1e293b; font-weight: 700; font-size: 11px; color: white; padding-top: 6px; padding-bottom: 6px; }
    .total-row td { font-weight: 700; background: rgba(99,102,241,0.08); border-top: 2px solid var(--accent); }
    .total-row .row-label { background: rgba(99,102,241,0.08); font-weight: 700; }
    .grand-total td { font-weight: 800; font-size: 12px; background: rgba(234,179,8,0.08); border-top: 3px solid var(--yellow); }
    .grand-total .row-label { background: rgba(234,179,8,0.08); font-weight: 800; font-size: 12px; }
    .indent-1 .row-label { padding-left: 20px; font-weight: 400; }

    .loading { display: flex; align-items: center; justify-content: center; min-height: 400px; color: var(--text-dim); font-size: 14px; }
    .snap-info { font-size: 11px; color: var(--text-dim); text-align: center; padding: 8px; }
  </style>
  <script src="/auth.js"></script>
  <script src="/global-ui.js"></script>
</head>
<body>
  <div class="header">
    <h1>Intercompany Detail</h1>
    <div class="nav">
      <a href="/">Overview</a>
      <a href="/reports.html">Reports</a>
      <a href="/cash.html">Cash</a>
      <a href="/consolidated-bs.html">Consolidated</a>
      <a href="/ic-detail.html" class="active">IC Detail</a>
      <a href="/reconciliation.html">Reconciliation</a>
      <a href="/kanban.html">Tasks</a>
    </div>
  </div>
  <div class="controls">
    <label>As of:</label>
    <input type="date" id="asOfDate" value="2026-02-28">
    <button class="btn primary" onclick="loadData()">Apply</button>
  </div>

  <div class="scroll-container">
    <div id="content"><div class="loading">Loading...</div></div>
  </div>
  <div class="snap-info" id="snapInfo"></div>

  <script>
    function fmt(n) {
      if (n == null || isNaN(n)) return '-';
      if (Math.abs(n) < 0.5) return '-';
      var s = Math.abs(Math.round(n)).toLocaleString('en-US');
      return n < 0 ? '(' + s + ')' : s;
    }
    // Toggle collapsible section
    window.toggleSection = function(sectId, el) {
      var rows = document.querySelectorAll('[data-in-section="' + sectId + '"]');
      var collapsed = el.classList.toggle('collapsed');
      var arrow = el.querySelector('.sect-arrow');
      if (arrow) arrow.textContent = collapsed ? '▸' : '▾';
      rows.forEach(function(r) { r.style.display = collapsed ? 'none' : ''; });
    };

    function valCls(n, col) {
      var cls = 'val';
      if (Math.abs(n) < 0.5) cls += ' zero';
      else if (n < 0) cls += ' negative';
      else cls += ' positive';
      if (col.name === 'Total') cls += ' total-val';
      else if (col.is_subtotal) cls += ' subtotal-val';
      return cls;
    }

    async function loadData() {
      var el = document.getElementById('content');
      var asOf = document.getElementById('asOfDate').value;
      try {
        var data = await (await fetch('/api/dashboard/ic-detail?as_of_date=' + asOf)).json();
        if (!data.columns || !data.sections || data.sections.length === 0) {
          el.innerHTML = '<div class="loading">No data found.</div>';
          return;
        }

        var cols = data.columns;
        var html = '<table><thead><tr><th class="row-label" style="background:#1a365d;color:white;text-align:left;min-width:360px">Conso Balance sheet as at ' + data.snapshot_date + '</th>';
        cols.forEach(function(col) {
          var cls = col.name === 'Total' ? 'total-col' : col.is_subtotal ? 'subtotal-col' : '';
          html += '<th class="' + cls + '">' + col.name + '</th>';
        });
        html += '</tr></thead><tbody>';

        var currentSectionId = null;
        var sectionCounter = 0;
        data.sections.forEach(function(row) {
          if (row.type === 'section') {
            sectionCounter++;
            currentSectionId = 'sect-' + sectionCounter;
            // Collapsible section header
            html += '<tr class="section-row" data-section="' + currentSectionId + '" style="cursor:pointer" onclick="toggleSection(\'' + currentSectionId + '\', this)"><td class="row-label"><span class="sect-arrow">▾</span> ' + row.label + '</td>';
            cols.forEach(function() { html += '<td></td>'; });
            html += '</tr>';
          } else if (row.code === 'TOTAL_LIABILITIES') {
            html += '<tr class="grand-total"><td class="row-label">' + row.label + '</td>';
            row.values.forEach(function(val, i) {
              html += '<td class="' + valCls(val, cols[i]) + '">' + fmt(val) + '</td>';
            });
            html += '</tr>';
          } else if (row.is_total) {
            html += '<tr class="total-row" data-in-section="' + currentSectionId + '"><td class="row-label">' + row.label + '</td>';
            row.values.forEach(function(val, i) {
              html += '<td class="' + valCls(val, cols[i]) + '">' + fmt(val) + '</td>';
            });
            html += '</tr>';
          } else {
            var indentCls = row.indent ? 'indent-' + row.indent : '';
            html += '<tr class="' + indentCls + '" data-in-section="' + currentSectionId + '"><td class="row-label">' + row.label + '</td>';
            row.values.forEach(function(val, i) {
              html += '<td class="' + valCls(val, cols[i]) + '">' + fmt(val) + '</td>';
            });
            html += '</tr>';
          }
        });

        html += '</tbody></table>';
        el.innerHTML = html;
        document.getElementById('snapInfo').textContent = 'Data as of ' + data.snapshot_date;
      } catch (err) {
        el.innerHTML = '<div class="loading">Error: ' + err.message + '</div>';
      }
    }

    loadData();
  </script>
<script src="/chat-widget.js"></script>
</body>
</html>
